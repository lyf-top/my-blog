name = "my-blog"
compatibility_date = "2026-07-07"

pages_build_output_dir = "./dist"

[vars]
NODE_VERSION = "22"
# Umami 统计配置
UMAMI_API_URL = "https://umami.fqzlr.com"
UMAMI_WEBSITE_ID = "4f4d87b0-bf0f-403a-a7c1-71962537673a"

# 敏感信息请在 Cloudflare Dashboard → Workers & Pages →
# 你的 Worker → Settings → Variables and Secrets 中添加 Secret：
# AI_API_KEY
# UMAMI_TOKEN
# GitHub App 认证（在线编辑功能必需）：
# PUBLIC_GITHUB_APP_ID = "你的GitHub App数字ID"
# GH_PRIVATE_KEY = "-----BEGIN RSA PRIVATE KEY-----\n...\n-----END RSA PRIVATE KEY-----"（完整PEM私钥文本）
# 可选变量：
# PUBLIC_GITHUB_OWNER = "fqzlr"（仓库所有者，默认fqzlr）
# PUBLIC_GITHUB_REPO = "my-blog"（仓库名，默认my-blog）
# ALLOWED_ORIGINS = "https://your-domain.example"

[[kv_namespaces]]
binding = "VISITOR_KV"
id = "256f386aa8894aa9bef4d6487bc1d3a6"

[[vectorize]]
binding = "VECTORIZE"
index_name = "blog-ai-search"

[ai]
binding = "AI"
